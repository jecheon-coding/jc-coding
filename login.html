<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>관리자 로그인 | Coding & Play</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .login-section {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-dark);
        }
        .login-box {
            width: 100%;
            max-width: 400px;
            padding: 3rem;
        }
        .login-box h2 {
            text-align: center;
            margin-bottom: 2rem;
            font-size: 2rem;
        }
    </style>
</head>
<body>
    <section class="login-section">
        <div class="login-box glass">
            <h2>관리자 로그인</h2>
            <form id="loginForm" class="reservation-form">
                <div class="form-group">
                    <label for="email">관리자 이메일</label>
                    <input type="email" id="email" required placeholder="admin@example.com">
                </div>
                <div class="form-group">
                    <label for="password">비밀번호</label>
                    <input type="password" id="password" required placeholder="비밀번호 입력">
                </div>
                <button type="submit" class="contact-btn" style="width: 100%; border:none; cursor:pointer;">로그인</button>
            </form>
            <p style="text-align:center; margin-top:1.5rem;">
                <a href="index.html" style="color:var(--text-muted); font-size:0.9rem;">홈으로 돌아가기</a>
            </p>
        </div>
    </section>

    <script type="module" src="firebase.js"></script>
</body>
</html>
