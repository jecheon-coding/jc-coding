<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>관리자 대시보드 | Coding & Play</title>
    <link rel="stylesheet" href="style.css?v=8">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .admin-section {
            background: rgba(255,255,255,0.03);
            border-radius: 20px;
            padding: 2rem;
            margin-bottom: 2rem;
        }
        .tab-menu {
            display: flex;
            gap: 10px;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }
        .tab-btn {
            padding: 0.8rem 1.5rem;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            color: #fff;
            cursor: pointer;
            transition: all 0.3s;
        }
        .tab-btn.active {
            background: var(--primary);
            border-color: var(--primary);
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 2rem;
        }
        .stat-card {
            background: rgba(255,255,255,0.02);
            padding: 1.5rem;
            border-radius: 15px;
            text-align: center;
        }
        .stat-card h4 { font-size: 0.9rem; color: var(--text-muted); margin-bottom: 10px; }
        .stat-card .value { font-size: 2rem; font-weight: 700; color: var(--primary); }
    </style>
</head>
<body style="padding-top: 2rem;">
    <div class="container">
        <div class="admin-header">
            <div>
                <h1>Admin Dashboard</h1>
                <p style="color:var(--text-muted);">원장님 전용 통합 관리 시스템</p>
            </div>
            <div style="display:flex; gap:10px;">
                <a href="index.html" class="tab-btn" style="text-decoration:none;">홈페이지 가기</a>
                <button id="logoutBtn" class="tab-btn" style="background:#ef4444; border:none;">로그아웃</button>
            </div>
        </div>

        <div class="tab-menu">
            <button class="tab-btn active" id="tab-stats" onclick="switchTab('stats')">방문자 통계</button>
            <button class="tab-btn" id="tab-reviews" onclick="switchTab('reviews')">후기 관리</button>
            <button class="tab-btn" id="tab-schedules" onclick="switchTab('schedules')">모집 일정 관리</button>
            <button class="tab-btn" id="tab-inquiries" onclick="switchTab('inquiries')">상담 신청 내역</button>
        </div>

        <!-- 방문자 통계 섹션 -->
        <div id="stats-tab" class="admin-section">
            <div class="stats-grid">
                <div class="stat-card"><h4>오늘 방문</h4><div class="value" id="todayVisits">0</div></div>
                <div class="stat-card"><h4>어제 방문</h4><div class="value" id="yesterdayVisits">0</div></div>
                <div class="stat-card"><h4>전체 방문</h4><div class="value" id="totalVisits">0</div></div>
            </div>
            <div style="height:400px; width:100%;">
                <canvas id="visitsChart"></canvas>
            </div>
        </div>

        <!-- 후기 관리 섹션 -->
        <div id="reviews-tab" class="admin-section" style="display:none;">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 1.5rem;">
                <h3>등록된 후기 목록</h3>
            </div>
            <div id="adminReviewList">
                <!-- 후기 아이템이 여기에 렌더링됨 -->
            </div>
        </div>

        <!-- 일정 관리 섹션 -->
        <div id="schedules-tab" class="admin-section" style="display:none;">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 1.5rem;">
                <h3>모집 일정 관리</h3>
                <button onclick="openScheduleModal()" class="tab-btn" style="background:var(--primary);">신규 일정 등록</button>
            </div>
            <div id="adminScheduleList">
                <!-- 일정 아이템이 여기에 렌더링됨 -->
            </div>
        </div>

        <!-- 상담 신청 내역 섹션 -->
        <div id="inquiries-tab" class="admin-section" style="display:none;">
            <h3>상담 신청 내역</h3>
            <div style="overflow-x:auto;">
                <table style="width:100%; border-collapse:collapse; margin-top:1rem;">
                    <thead>
                        <tr style="border-bottom: 1px solid rgba(255,255,255,0.1); text-align:left;">
                            <th style="padding:10px;">날짜</th>
                            <th style="padding:10px;">이름</th>
                            <th style="padding:10px;">연락처</th>
                            <th style="padding:10px;">학년</th>
                            <th style="padding:10px;">문의내용</th>
                        </tr>
                    </thead>
                    <tbody id="inquiryTableBody">
                        <!-- 내역이 여기에 렌더링됨 -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        function switchTab(tab) {
            document.querySelectorAll('.admin-section').forEach(s => s.style.display = 'none');
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            
            document.getElementById(tab + '-tab').style.display = 'block';
            document.getElementById('tab-' + tab).classList.add('active');
        }
    </script>
    <script type="module" src="firebase.js"></script>
</body>
</html>
