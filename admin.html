<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>관리자 대시보드 | 제천코딩학원</title>
    <link rel="stylesheet" href="style.css?v=8">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --admin-bg: #0a0a0c;
            --admin-card: rgba(255, 255, 255, 0.03);
            --admin-border: rgba(255, 255, 255, 0.08);
        }
        body { background: var(--admin-bg); color: white; min-height: 100vh; font-family: 'Pretendard', sans-serif; }
        .admin-layout { max-width: 1200px; margin: 0 auto; padding: 40px 20px; }
        .admin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
        
        /* Tab Navigation (Very Clean Underline) */
        .admin-tabs { display: flex; gap: 40px; margin-bottom: 30px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .tab-btn {
            background: none; border: none; color: #888; padding: 15px 5px; cursor: pointer;
            font-size: 1.05rem; font-weight: 500; position: relative; transition: all 0.3s;
        }
        .tab-btn.active { color: var(--primary); }
        .tab-btn.active::after {
            content: ''; position: absolute; bottom: -1px; left: 0; width: 100%; height: 2px; background: var(--primary);
        }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* Stats Cards (Value Top, Label Bottom) */
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 40px; }
        .stat-card { background: var(--admin-card); border: 1px solid var(--admin-border); border-radius: 12px; padding: 40px 20px; text-align: center; }
        .stat-card .value { font-size: 2.8rem; font-weight: 700; color: #3b82f6; margin-bottom: 10px; }
        .stat-card h3 { color: #888; font-size: 1rem; font-weight: 400; }

        /* Item Cards */
        .admin-item { 
            background: var(--admin-card); border: 1px solid var(--admin-border); border-radius: 12px; 
            padding: 25px 35px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; 
        }
        .admin-item strong { font-size: 1.15rem; font-weight: 700; display: block; margin-bottom: 8px; }
        .admin-item p { color: #888; font-size: 0.95rem; }
        
        .btn-group { display: flex; gap: 10px; }
        .edit-btn { background: rgba(59, 130, 246, 0.1); color: #3b82f6; border: 1px solid rgba(59, 130, 246, 0.2); padding: 8px 18px; border-radius: 8px; cursor: pointer; font-size: 0.9rem; }
        .edit-btn:hover { background: #3b82f6; color: white; }
        .delete-btn { background: rgba(239, 68, 68, 0.08); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.15); padding: 8px 18px; border-radius: 8px; cursor: pointer; font-size: 0.9rem; }
        .delete-btn:hover { background: #ef4444; color: white; }

        .add-btn { background: #3b82f6; color: white; padding: 12px 24px; border-radius: 10px; border: none; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 8px; }
    </style>
</head>
<body>
    <div class="admin-layout">
        <header class="admin-header">
            <div>
                <h1 style="font-size: 2.5rem; letter-spacing: -1px;">Admin Dashboard</h1>
                <p style="color:#777; margin-top:5px;">원장님 전용 통합 관리 시스템</p>
            </div>
            <div style="display:flex; gap:12px;">
                <a href="index.html" style="background:#1a1a1c; color:white; padding:10px 20px; border-radius:10px; text-decoration:none; display:flex; align-items:center; gap:8px; border:1px solid #333;">🏠 홈페이지 가기</a>
                <button id="logoutBtn" style="background:rgba(239,68,68,0.1); color:#ef4444; border:1px solid rgba(239,68,68,0.2); padding:10px 20px; border-radius:10px; cursor:pointer; font-weight:600;">로그아웃</button>
            </div>
        </header>

        <nav class="admin-tabs">
            <button class="tab-btn active" onclick="showTab('stats', this)">방문자 통계</button>
            <button class="tab-btn" onclick="showTab('reviews', this)">후기 관리</button>
            <button class="tab-btn" onclick="showTab('schedules', this)">모집 일정 관리</button>
            <button class="tab-btn" onclick="showTab('inquiries', this)">상담 신청 내역</button>
        </nav>

        <div id="stats" class="tab-content active">
            <div class="stats-grid">
                <div class="stat-card">
                    <div id="todayVisits" class="value">0</div>
                    <h3>오늘의 방문자</h3>
                </div>
                <div class="stat-card">
                    <div id="yesterdayVisits" class="value">0</div>
                    <h3>어제 방문자</h3>
                </div>
                <div class="stat-card">
                    <div id="totalVisits" class="value">0</div>
                    <h3>전체 방문자</h3>
                </div>
            </div>
            <div style="background:var(--admin-card); border:1px solid var(--admin-border); border-radius:20px; padding:30px; height:450px;">
                <h3 style="margin-bottom:30px; font-weight:600; font-size:1.1rem;">주간 방문 추이</h3>
                <canvas id="visitsChart"></canvas>
            </div>
        </div>

        <div id="reviews" class="tab-content">
            <h2 style="margin-bottom:25px; font-size:1.4rem;">등록된 후기 목록</h2>
            <div id="adminReviewList"></div>
        </div>

        <div id="schedules" class="tab-content">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:25px;">
                <h2 style="font-size:1.4rem;">모집 일정 목록</h2>
                <button class="add-btn">+ 새로운 일정 추가</button>
            </div>
            <div id="adminScheduleList"></div>
        </div>

        <div id="inquiries" class="tab-content">
            <h2 style="margin-bottom:25px; font-size:1.4rem;">상담 신청 내역</h2>
            <div style="background:var(--admin-card); border:1px solid var(--admin-border); border-radius:16px;">
                <table style="width:100%; border-collapse:collapse;">
                    <thead><tr style="border-bottom:1px solid var(--admin-border);"><th style="padding:20px; text-align:left; color:#888;">날짜</th><th style="padding:20px; text-align:left; color:#888;">이름</th><th style="padding:20px; text-align:left; color:#888;">연락처</th><th style="padding:20px; text-align:left; color:#888;">학년</th><th style="padding:20px; text-align:left; color:#888;">메시지</th></tr></thead>
                    <tbody id="inquiryTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>
    <script>
        function showTab(t,b){document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active'));document.querySelectorAll('.tab-btn').forEach(bb=>bb.classList.remove('active'));document.getElementById(t).classList.add('active');b.classList.add('active');}
    </script>
    <script type="module" src="firebase.js"></script>
</body>
</html>
